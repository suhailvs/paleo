<!DOCTYPE html>
<html>
  <head>
    <title>11QpaleoLev</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="static/leaflet/leaflet.css" />
    <script src="static/leaflet/leaflet.js"></script>
    <style>
      html,
      body,
      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body onload="init()">
    <!-- https://www.deadseascrolls.org.il/explore-the-archive/image/B-497904 -->
    <div id="map"></div>
    <script>
      function init() {
        var mapMinZoom = 10;
        var mapMaxZoom = 12;
        var map = L.map("map", {
          maxZoom: mapMaxZoom,
          minZoom: mapMinZoom,
          crs: L.CRS.Simple,
        }).setView([0, 0], mapMinZoom);
        L.tileLayer("tiles/v1/{z}/{x}/{y}.png", {
          maxNativeZoom: 11,
          minZoom: mapMinZoom,
          maxZoom: mapMaxZoom,
          // bounds: mapBounds,
        }).addTo(map);

        map.on("click", function (e) {
          let currZoom = map.getZoom();
          if (currZoom == mapMaxZoom) {
            let requestform = e.latlng;
            let formpopup = L.popup()
              .setLatLng(requestform)
              .setContent(`${e.latlng.lat}`)
              .openOn(map);
          }
        });
      }
    </script>
  </body>
</html>
